<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Vehicle Tracking</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; background-color: #0b0e14; color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }
        #map { height: 100%; width: 100%; z-index: 1; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const districts = {
            "Coimbatore": [11.0168, 76.9558],
            "Chennai": [13.0827, 80.2707],
            "Madurai": [9.9252, 78.1198],
            "Salem": [11.6643, 78.1460],
            "Trichy": [10.7905, 78.7047]
        };

        // Calculation: Earth distance between two lat/lng points
        const getDistanceKM = (coords1, coords2) => {
            const [lat1, lon1] = coords1;
            const [lat2, lon2] = coords2;
            const R = 6371; // km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        };

        const LoginScreen = ({ onLogin }) => (
            <div className="h-screen w-full flex items-center justify-center bg-slate-900">
                <div className="bg-[#051c1c] p-10 rounded-lg shadow-2xl w-96 border border-slate-700">
                    <h2 className="text-center text-white font-bold mb-8 tracking-widest">USER LOGIN</h2>
                    <input type="text" placeholder="Username" className="w-full p-3 mb-4 rounded-full bg-slate-700 text-white outline-none border border-transparent focus:border-cyan-500" />
                    <input type="password" placeholder="Password" className="w-full p-3 mb-8 rounded-full bg-slate-700 text-white outline-none border border-transparent focus:border-cyan-500" />
                    <button onClick={onLogin} className="w-full bg-white text-black font-bold py-3 rounded-full hover:bg-gray-200 transition">LOGIN</button>
                </div>
            </div>
        );

        const SearchScreen = ({ onSearch }) => {
            const [from, setFrom] = useState("Coimbatore");
            const [to, setTo] = useState("Chennai");

            return (
                <div className="h-screen w-full flex items-center justify-center bg-slate-800 relative">
                    <div className="absolute inset-0 opacity-30 bg-[url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&q=80&w=2000')] bg-cover"></div>
                    <div className="relative glass p-10 rounded-3xl text-center shadow-2xl border border-white/10 w-[400px]">
                        <h1 className="text-2xl font-bold mb-2 flex items-center justify-center gap-2">🚌 Real-Time Vehicle Tracking</h1>
                        <p className="text-gray-300 mb-6 text-sm">Select districts to find your bus</p>
                        
                        <div className="text-left mb-4">
                            <label className="text-xs text-gray-400 ml-4">From District</label>
                            <select value={from} onChange={(e) => setFrom(e.target.value)} className="w-full p-3 mt-1 rounded-full bg-white text-black appearance-none cursor-pointer">
                                {Object.keys(districts).map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                        </div>

                        <div className="text-left mb-6">
                            <label className="text-xs text-gray-400 ml-4">To District</label>
                            <select value={to} onChange={(e) => setTo(e.target.value)} className="w-full p-3 mt-1 rounded-full bg-white text-black appearance-none cursor-pointer">
                                {Object.keys(districts).map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                        </div>

                        <button onClick={() => onSearch(from, to)} className="w-full bg-yellow-400 text-black font-bold py-3 rounded-full hover:bg-yellow-500 transition">Track Bus</button>
                    </div>
                </div>
            );
        };

        const LoadingScreen = () => (
            <div className="h-screen w-full flex flex-col items-center justify-center bg-[#0b0e14]">
                <div className="text-4xl mb-4 animate-bounce">🚌</div>
                <h2 className="text-3xl font-black italic tracking-tighter text-white">Loading Route</h2>
                <div className="w-48 h-1 bg-gray-700 mt-4 overflow-hidden relative rounded-full">
                    <div className="absolute inset-0 bg-orange-500 animate-[pulse_1.5s_infinite]"></div>
                </div>
            </div>
        );

        const MapScreen = ({ from, to, onBack }) => {
            const mapRef = useRef(null);
            const busMarkerRef = useRef(null);
            const [currentTime, setCurrentTime] = useState(new Date().toLocaleTimeString());
            const [progress, setProgress] = useState(0);

            const startCoords = districts[from];
            const endCoords = districts[to];
            const totalDist = getDistanceKM(startCoords, endCoords);

            useEffect(() => {
                // 1. Clock Update
                const clockInterval = setInterval(() => {
                    setCurrentTime(new Date().toLocaleTimeString());
                }, 1000);

                // 2. Initialize Map & Route
                const timer = setTimeout(() => {
                    if (!mapRef.current) {
                        const map = L.map('map').setView(startCoords, 7);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '&copy; OSM'
                        }).addTo(map);

                        // Draw dashed line for route
                        const routeLine = L.polyline([startCoords, endCoords], {
                            color: '#f97316',
                            weight: 4,
                            dashArray: '10, 10'
                        }).addTo(map);

                        map.fitBounds(routeLine.getBounds(), { padding: [50, 50] });

                        // Start/End visuals
                        L.circleMarker(startCoords, { color: '#22c55e', radius: 6 }).addTo(map);
                        L.circleMarker(endCoords, { color: '#ef4444', radius: 6 }).addTo(map);

                        // Bus Marker
                        busMarkerRef.current = L.marker(startCoords, {
                            icon: L.divIcon({ html: '🚌', className: 'text-2xl', iconSize: [30, 30] })
                        }).addTo(map);

                        mapRef.current = map;
                    }
                }, 100);

                // 3. Move Bus Simulation
                const simInterval = setInterval(() => {
                    setProgress(prev => {
                        if (prev >= 100) return 100;
                        const nextProgress = prev + 0.1;
                        
                        // Move bus marker visually
                        if (busMarkerRef.current) {
                            const currentLat = startCoords[0] + (endCoords[0] - startCoords[0]) * (nextProgress / 100);
                            const currentLng = startCoords[1] + (endCoords[1] - startCoords[1]) * (nextProgress / 100);
                            busMarkerRef.current.setLatLng([currentLat, currentLng]);
                        }
                        return nextProgress;
                    });
                }, 100);

                return () => {
                    clearInterval(clockInterval);
                    clearInterval(simInterval);
                    clearTimeout(timer);
                    if (mapRef.current) mapRef.current.remove();
                };
            }, [from, to]);

            // ETA and Remaining logic
            const remainingDist = (totalDist * (1 - progress / 100)).toFixed(1);
            const etaMinutes = Math.round(remainingDist * 1.5); // Simulating 40km/h avg speed

            return (
                <div className="h-screen w-full flex overflow-hidden">
                    {/* LEFT SIDE: DATA PANEL */}
                    <div className="w-1/3 bg-[#111318] border-r border-white/10 flex flex-col p-6 custom-scrollbar overflow-y-auto z-10">
                        <button onClick={onBack} className="text-gray-400 hover:text-white mb-6 flex items-center gap-2">← Change Route</button>
                        
                        <div className="mb-8">
                            <h2 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Trip Overview</h2>
                            <div className="flex items-center gap-4 bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                <div className="text-green-500 font-bold">{from}</div>
                                <div className="text-gray-600">→</div>
                                <div className="text-orange-500 font-bold">{to}</div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                <p className="text-[10px] text-gray-400 uppercase">Current Time</p>
                                <p className="text-lg font-bold">{currentTime}</p>
                            </div>
                            <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                <p className="text-[10px] text-gray-400 uppercase">Total Distance</p>
                                <p className="text-lg font-bold">{totalDist} km</p>
                            </div>
                            <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                <p className="text-[10px] text-gray-400 uppercase">ETA</p>
                                <p className="text-lg font-bold text-orange-400">{etaMinutes} mins</p>
                            </div>
                            <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                <p className="text-[10px] text-gray-400 uppercase">Progress</p>
                                <p className="text-lg font-bold text-green-400">{Math.floor(progress)}%</p>
                            </div>
                        </div>

                        <div className="flex-1">
                            <h2 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Upcoming Stops</h2>
                            <div className="space-y-4 relative ml-2 border-l border-slate-700 pl-6">
                                <div className={`relative ${progress > 25 ? 'opacity-30' : ''}`}>
                                    <div className={`absolute -left-[29px] top-1 w-3 h-3 rounded-full ${progress > 25 ? 'bg-gray-500' : 'bg-blue-500 animate-pulse'}`}></div>
                                    <p className="text-sm font-bold">Inter-District Checkpoint</p>
                                    <p className="text-xs text-gray-500">{(totalDist * 0.25).toFixed(0)} km from start</p>
                                </div>
                                <div className={`relative ${progress > 60 ? 'opacity-30' : ''}`}>
                                    <div className={`absolute -left-[29px] top-1 w-3 h-3 rounded-full ${progress > 60 ? 'bg-gray-500' : 'bg-blue-500'}`}></div>
                                    <p className="text-sm font-bold">Highway Transit Plaza</p>
                                    <p className="text-xs text-gray-500">{(totalDist * 0.6).toFixed(0)} km from start</p>
                                </div>
                                <div className="relative">
                                    <div className="absolute -left-[29px] top-1 w-3 h-3 bg-red-500 rounded-full"></div>
                                    <p className="text-sm font-bold">Final Destination: {to}</p>
                                    <p className="text-xs text-gray-500">Remaining: {remainingDist} km</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* RIGHT SIDE: MAP */}
                    <div className="w-2/3 relative">
                        <div id="map"></div>
                        <div className="absolute top-4 right-4 z-[1000] flex gap-2">
                            <span className="bg-red-600 px-3 py-1 rounded text-[10px] font-bold animate-pulse">● LIVE TRACKING</span>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('login');
            const [route, setRoute] = useState({ from: '', to: '' });

            const handleLogin = () => setView('search');
            const handleSearch = (from, to) => {
                setRoute({ from, to });
                setView('loading');
                setTimeout(() => setView('map'), 1500);
            };

            switch(view) {
                case 'login': return <LoginScreen onLogin={handleLogin} />;
                case 'search': return <SearchScreen onSearch={handleSearch} />;
                case 'loading': return <LoadingScreen />;
                case 'map': return <MapScreen from={route.from} to={route.to} onBack={() => setView('search')} />;
                default: return <LoginScreen />;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
