<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Vehicle Tracking</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <style>
        body { margin: 0; background-color: #0b0e14; color: white; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); }
        #map { height: 100%; width: 100%; z-index: 1; }
        /* Hide the routing instructions panel to keep the UI clean */
        .leaflet-routing-container { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const districts = {
            "Coimbatore": [11.0168, 76.9558],
            "Chennai": [13.0827, 80.2707],
            "Madurai": [9.9252, 78.1198],
            "Salem": [11.6643, 78.1460],
            "Trichy": [10.7905, 78.7047]
        };

        const LoginScreen = ({ onLogin }) => (
            <div className="h-screen w-full flex items-center justify-center bg-cover bg-center relative" 
                 style={{ backgroundImage: "url('https://images.unsplash.com/photo-1509059852496-f3822ae057bf?auto=format&fit=crop&q=80&w=2000')" }}>
                <div className="absolute inset-0 bg-black/50"></div>
                <div className="relative bg-[#051c1c]/90 p-10 rounded-lg shadow-2xl w-96 border border-slate-700 backdrop-blur-sm">
                    <h2 className="text-center text-white font-bold mb-8 tracking-widest">USER LOGIN</h2>
                    <input type="text" placeholder="Username" className="w-full p-3 mb-4 rounded-full bg-slate-700 text-white outline-none border border-transparent focus:border-cyan-500" />
                    <input type="password" placeholder="Password" className="w-full p-3 mb-8 rounded-full bg-slate-700 text-white outline-none border border-transparent focus:border-cyan-500" />
                    <button onClick={onLogin} className="w-full bg-white text-black font-bold py-3 rounded-full hover:bg-gray-200 transition">LOGIN</button>
                </div>
            </div>
        );

        const SearchScreen = ({ onSearch }) => {
            const [from, setFrom] = useState("Coimbatore");
            const [to, setTo] = useState("Chennai");

            return (
                <div className="h-screen w-full flex items-center justify-center relative bg-slate-900">
                    <div className="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1473830394358-91588751b241?auto=format&fit=crop&q=80&w=2000')] bg-cover bg-center opacity-40"></div>
                    <div className="relative glass p-10 rounded-3xl text-center shadow-2xl border border-white/10 w-[400px]">
                        <h1 className="text-2xl font-bold mb-2 flex items-center justify-center gap-2">🚌 Real-Time Tracking</h1>
                        <p className="text-gray-300 mb-6 text-sm">Select districts to find your bus</p>
                        
                        <div className="text-left mb-4">
                            <label className="text-xs text-gray-400 ml-4">From District</label>
                            <select value={from} onChange={(e) => setFrom(e.target.value)} className="w-full p-3 mt-1 rounded-full bg-white text-black appearance-none cursor-pointer">
                                {Object.keys(districts).map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                        </div>

                        <div className="text-left mb-6">
                            <label className="text-xs text-gray-400 ml-4">To District</label>
                            <select value={to} onChange={(e) => setTo(e.target.value)} className="w-full p-3 mt-1 rounded-full bg-white text-black appearance-none cursor-pointer">
                                {Object.keys(districts).map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                        </div>

                        <button onClick={() => onSearch(from, to)} className="w-full bg-yellow-400 text-black font-bold py-3 rounded-full hover:bg-yellow-500 transition">Track Bus</button>
                    </div>
                </div>
            );
        };

        const LoadingScreen = () => (
            <div className="h-screen w-full flex flex-col items-center justify-center bg-[#0b0e14]">
                <div className="text-4xl mb-4 animate-bounce">🚌</div>
                <h2 className="text-3xl font-black italic tracking-tighter text-white">Loading Route</h2>
                <div className="w-48 h-1 bg-gray-700 mt-4 overflow-hidden relative rounded-full">
                    <div className="absolute inset-0 bg-orange-500 animate-[pulse_1.5s_infinite]"></div>
                </div>
            </div>
        );

        const MapScreen = ({ from, to, onBack }) => {
            const mapRef = useRef(null);

            useEffect(() => {
                const timer = setTimeout(() => {
                    if (!mapRef.current) {
                        const startCoords = districts[from];
                        const endCoords = districts[to];
                        
                        const map = L.map('map').setView(startCoords, 7);
                        
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '&copy; OpenStreetMap'
                        }).addTo(map);

                        // Routing Control for actual road paths
                        const control = L.Routing.control({
                            waypoints: [
                                L.latLng(startCoords[0], startCoords[1]),
                                L.latLng(endCoords[0], endCoords[1])
                            ],
                            lineOptions: {
                                styles: [{ color: '#f97316', opacity: 0.8, weight: 6 }]
                            },
                            createMarker: function(i, wp, nWps) {
                                if (i === 0) return L.circleMarker(wp.latLng, { color: '#22c55e', radius: 8, fillOpacity: 1 }).bindPopup("Start: " + from);
                                if (i === nWps - 1) return L.circleMarker(wp.latLng, { color: '#f97316', radius: 8, fillOpacity: 1 }).bindPopup("End: " + to);
                                return null;
                            },
                            addWaypoints: false,
                            routeWhileDragging: false
                        }).addTo(map);

                        // Add moving bus icon at start
                        L.marker(startCoords, {
                            icon: L.divIcon({ html: '🚌', className: 'text-2xl', iconSize: [30, 30] })
                        }).addTo(map);

                        mapRef.current = map;
                    }
                }, 100);

                return () => {
                    clearTimeout(timer);
                    if (mapRef.current) {
                        mapRef.current.remove();
                        mapRef.current = null;
                    }
                };
            }, [from, to]);

            return (
                <div className="h-screen w-full flex overflow-hidden">
                    <div className="w-2/3 relative border-r border-white/10">
                        <div id="map"></div>
                        <div className="absolute top-4 left-4 z-[1000] flex gap-2">
                            <span className="bg-red-600 px-3 py-1 rounded text-[10px] font-bold animate-pulse">● LIVE TRACKING</span>
                        </div>
                    </div>

                    <div className="w-1/3 bg-[#111318] flex flex-col p-6 custom-scrollbar overflow-y-auto">
                        <button onClick={onBack} className="text-gray-400 hover:text-white mb-6 flex items-center gap-2">← Change Route</button>
                        
                        <div className="mb-8">
                            <h2 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Trip Overview</h2>
                            <div className="flex items-center gap-4 bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                <div className="text-green-500 font-bold">{from}</div>
                                <div className="text-gray-600">→</div>
                                <div className="text-orange-500 font-bold">{to}</div>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4 mb-8">
                            <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                <p className="text-[10px] text-gray-400 uppercase">Status</p>
                                <p className="text-lg font-bold text-green-400">On Time</p>
                            </div>
                            <div className="bg-slate-800/40 p-4 rounded-xl border border-white/5">
                                <p className="text-[10px] text-gray-400 uppercase">Speed</p>
                                <p className="text-lg font-bold">65 km/h</p>
                            </div>
                        </div>

                        <div className="flex-1">
                            <h2 className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Journey Stats</h2>
                            <div className="space-y-4 relative ml-2 border-l border-slate-700 pl-6">
                                <div className="relative"><div className="absolute -left-[29px] top-1 w-3 h-3 bg-green-500 rounded-full"></div><p className="text-sm font-bold">Departed {from}</p></div>
                                <div className="relative"><div className="absolute -left-[29px] top-1 w-3 h-3 bg-blue-500 rounded-full"></div><p className="text-sm font-bold">En Route</p></div>
                                <div className="relative opacity-50"><div className="absolute -left-[29px] top-1 w-3 h-3 bg-gray-500 rounded-full"></div><p className="text-sm font-bold">Arriving at {to}</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('login');
            const [route, setRoute] = useState({ from: '', to: '' });

            const handleLogin = () => setView('search');
            const handleSearch = (from, to) => {
                setRoute({ from, to });
                setView('loading');
                setTimeout(() => setView('map'), 1500);
            };

            switch(view) {
                case 'login': return <LoginScreen onLogin={handleLogin} />;
                case 'search': return <SearchScreen onSearch={handleSearch} />;
                case 'loading': return <LoadingScreen />;
                case 'map': return <MapScreen from={route.from} to={route.to} onBack={() => setView('search')} />;
                default: return <LoginScreen />;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
